<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Beacon — live agent activity</title>
<style>
  :root {
    --bg: #0b0e14; --panel: #141922; --border: #232a36; --text: #e6edf3;
    --muted: #8b97a7; --accent: #4c9aff; --warn: #ffb547; --danger: #ff6b6b; --ok: #3fb950;
  }
  html[data-theme="light"] {
    --bg: #f6f8fa; --panel: #ffffff; --border: #d0d7de; --text: #1f2328;
    --muted: #656d76; --accent: #0969da; --warn: #9a6700; --danger: #cf222e; --ok: #1a7f37;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
         background: var(--bg); color: var(--text); display: flex; flex-direction: column; min-height: 100vh; }
  header { display: flex; align-items: center; gap: 12px; padding: 18px 24px; border-bottom: 1px solid var(--border); }
  .logo { font-size: 20px; font-weight: 700; letter-spacing: .3px; }
  .logo span { color: var(--accent); }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--ok); box-shadow: 0 0 8px var(--ok); }
  .sub { color: var(--muted); font-size: 12px; }
  .count { margin-left: auto; color: var(--muted); font-size: 13px; }
  .controls { display: flex; gap: 8px; }
  button { background: var(--panel); color: var(--text); border: 1px solid var(--border);
           border-radius: 7px; padding: 5px 11px; font-size: 12px; cursor: pointer; }
  button:hover { border-color: var(--accent); }
  #quit:hover { border-color: var(--danger); color: var(--danger); }
  .actorchip { display: inline-flex; align-items: center; gap: 5px; }
  .actordot { width: 9px; height: 9px; border-radius: 50%; flex: none; }
  .detailbtn { background: transparent; border: 1px solid var(--border); color: var(--muted);
               border-radius: 6px; padding: 4px 9px; font-size: 12px; cursor: pointer; white-space: nowrap; }
  .detailbtn:hover { color: var(--text); border-color: var(--accent); }
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.55); display: none; align-items: center; justify-content: center; padding: 20px; }
  .overlay.open { display: flex; }
  .modal { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 20px 22px; max-width: 580px; width: 100%; }
  .modal h3 { margin: 0 0 14px; font-size: 15px; }
  .modal dl { display: grid; grid-template-columns: max-content 1fr; gap: 7px 16px; margin: 0; font-size: 13px; }
  .modal dt { color: var(--muted); }
  .modal dd { margin: 0; font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; word-break: break-all; }
  .modal .close { float: right; margin-top: -4px; }
  .modal h3 + .section { margin-top: 8px; }
  .section { margin: 0 0 18px; display: flex; flex-direction: column; gap: 10px; }
  .toggle { display: flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer; }
  .toggle input { width: 15px; height: 15px; cursor: pointer; }
  .hint { color: var(--muted); font-size: 12px; }
  .row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  select { background: var(--panel); color: var(--text); border: 1px solid var(--border); border-radius: 7px; padding: 5px 9px; font-size: 12px; }
  .logview { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px;
             max-height: 300px; overflow: auto; font-family: ui-monospace, Menlo, Consolas, monospace;
             font-size: 12px; white-space: pre-wrap; word-break: break-all; margin: 0; }
  main { padding: 20px 24px; max-width: 1000px; margin: 0 auto; width: 100%; flex: 1 0 auto; }
  .empty { color: var(--muted); text-align: center; padding: 64px 0; }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
          padding: 14px 16px; margin-bottom: 10px; display: flex; align-items: center; gap: 14px; }
  .card.conflict { border-color: var(--warn); box-shadow: 0 0 0 1px var(--warn) inset; }
  .badge { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px;
           padding: 3px 8px; border-radius: 6px; white-space: nowrap; }
  .b-editing { background: rgba(76,154,255,.15); color: var(--accent); }
  .b-git { background: rgba(255,107,107,.15); color: var(--danger); }
  .b-build, .b-deploy, .b-working { background: rgba(63,185,80,.15); color: var(--ok); }
  .target { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; font-size: 13px; word-break: break-all; }
  .meta { color: var(--muted); font-size: 12px; margin-top: 2px; }
  .who { color: var(--text); }
  .grow { flex: 1; min-width: 0; }
  .warntag { color: var(--warn); font-size: 12px; font-weight: 600; white-space: nowrap; }
  footer { text-align: center; color: var(--muted); font-size: 12px; padding: 20px; }
  a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>
<header>
  <span class="dot" id="dot"></span>
  <span class="logo">Beacon<span>.</span></span>
  <span class="sub">live agent activity</span>
  <span class="count" id="count">—</span>
  <span class="controls">
    <button id="settings" title="Settings, updates, logs">⚙</button>
    <button id="theme" title="Toggle light / dark">◐</button>
    <button id="clear" title="Dismiss all current activity for every session (does not touch files or history)">Clear</button>
    <button id="restart" title="Restart the daemon">Restart</button>
    <button id="quit" title="Stop the daemon">Quit</button>
  </span>
</header>
<main>
  <div id="list"></div>
  <div class="empty" id="empty">No agents active right now. Activity appears here the moment a session starts editing.</div>
</main>
<footer>Beacon runs 100% locally · <a href="https://github.com/a1473838623/agent-beacon">github.com/a1473838623/agent-beacon</a></footer>
<div id="toast" style="position:fixed;bottom:18px;left:50%;transform:translateX(-50%);max-width:80%;font-size:13px;opacity:0;transition:opacity .3s;background:var(--panel);border:1px solid var(--border);padding:9px 15px;border-radius:8px;"></div>
<div class="overlay" id="overlay">
  <div class="modal">
    <button class="detailbtn close" id="mclose">close</button>
    <h3>Activity details</h3>
    <div id="mbody"></div>
  </div>
</div>

<div class="overlay" id="soverlay">
  <div class="modal" style="max-width:660px">
    <button class="detailbtn close" id="sclose">close</button>
    <h3>Settings</h3>
    <div class="section">
      <label class="toggle"><input type="checkbox" id="setAutoCheck"> Auto-check for updates <span class="hint">(off by default · contacts GitHub only when enabled)</span></label>
      <label class="toggle"><input type="checkbox" id="setBoot"> Start Beacon on login <span class="hint" id="bootHint"></span></label>
    </div>
    <h3>Updates</h3>
    <div class="section">
      <div class="row"><span id="verLine" class="hint">version —</span><button class="detailbtn" id="checkUpd">Check now</button><span id="updResult" class="hint"></span></div>
      <div class="row"><button class="detailbtn" id="applyUpd" style="display:none">Update (git pull)</button></div>
    </div>
    <h3>Logs <span class="hint">— stored per day, 100% local</span></h3>
    <div class="section">
      <div class="row">
        <select id="logDay"></select>
        <button class="detailbtn" id="logRefresh">Refresh</button>
        <button class="detailbtn" id="logDel">Delete this day</button>
        <button class="detailbtn" id="logDelAll">Delete all</button>
      </div>
      <pre id="logView" class="logview">(select a day)</pre>
    </div>
  </div>
</div>

<script>
  const listEl = document.getElementById('list');
  const emptyEl = document.getElementById('empty');
  const countEl = document.getElementById('count');
  const dot = document.getElementById('dot');
  let lastItems = [];

  function ago(ts) {
    const s = Math.max(0, Math.round((Date.now() - ts) / 1000));
    if (s < 60) return s + 's ago';
    const m = Math.round(s / 60);
    if (m < 60) return m + 'm ago';
    return Math.round(m / 60) + 'h ago';
  }
  function shortTarget(t) {
    if (!t) return '';
    const parts = String(t).replace(/\\/g, '/').split('/');
    return parts.slice(-3).join('/');
  }
  function badgeClass(action) {
    if (action.startsWith('editing')) return 'b-editing';
    if (action.startsWith('git')) return 'b-git';
    if (action.startsWith('build')) return 'b-build';
    if (action.startsWith('deploy')) return 'b-deploy';
    return 'b-working';
  }

  function render(items) {
    countEl.textContent = items.length ? items.length + ' active' : '';
    emptyEl.style.display = items.length ? 'none' : 'block';

    // Mark targets touched by 2+ distinct actors as conflicts.
    const byTarget = {};
    for (const a of items) {
      const k = (a.target || '').toLowerCase();
      (byTarget[k] = byTarget[k] || new Set()).add(a.actor);
    }

    items.sort((a, b) => b.heartbeat - a.heartbeat);
    lastItems = items;
    listEl.innerHTML = items.map(a => {
      const conflict = (byTarget[(a.target || '').toLowerCase()] || new Set()).size > 1;
      const color = colorFor(a.actor);
      return `<div class="card ${conflict ? 'conflict' : ''}" style="border-left:3px solid ${color}">
        <span class="badge ${badgeClass(a.action)}">${escapeHtml(a.action.replace('git:', 'git '))}</span>
        <div class="grow">
          <div class="target">${escapeHtml(shortTarget(a.target)) || '(working tree)'}</div>
          <div class="meta"><span class="actorchip"><span class="actordot" style="background:${color}"></span><span class="who">${escapeHtml(a.actorLabel || a.actor)}</span></span> · ${ago(a.startedAt)}${a.exclusive ? ' · exclusive' : ''}</div>
        </div>
        ${conflict ? '<span class="warntag">⚠ overlap</span>' : ''}
        <button class="detailbtn" data-id="${a.id}">details</button>
      </div>`;
    }).join('');
  }

  // Stable per-actor color so you can tell sessions apart at a glance.
  // Hash (FNV-1a) into a fixed palette of clearly-distinct swatches — avoids the
  // "two nearly-identical hues" problem you get hashing onto a continuous wheel.
  const PALETTE = ['#4c9aff', '#f2683c', '#3fb950', '#c264fe', '#ffb547', '#2dd4bf',
    '#ff6b9d', '#a3e635', '#38bdf8', '#f472b6', '#facc15', '#818cf8', '#fb7185', '#34d399'];
  function colorFor(s) {
    s = String(s || '');
    let h = 2166136261;
    for (let i = 0; i < s.length; i++) { h ^= s.charCodeAt(i); h = Math.imul(h, 16777619); }
    return PALETTE[(h >>> 0) % PALETTE.length];
  }

  function escapeHtml(s) { return String(s).replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c])); }

  function connect() {
    const es = new EventSource('/events');
    es.onmessage = (e) => { dot.style.background = 'var(--ok)'; try { render(JSON.parse(e.data)); } catch {} };
    es.onerror = () => { dot.style.background = 'var(--danger)'; };
  }
  connect();
  setInterval(() => { // refresh relative timestamps
    document.querySelectorAll('.card').length && fetch('/activity').then(r => r.json()).then(d => render(d.activities)).catch(() => {});
  }, 5000);

  async function ctl(path) {
    try { const r = await fetch(path, { method: 'POST', headers: { 'content-type': 'application/json' }, body: '{}' }); return r.ok; }
    catch { return false; }
  }
  function toast(msg, bad) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.color = bad ? 'var(--danger)' : 'var(--ok)';
    t.style.borderColor = bad ? 'var(--danger)' : 'var(--border)';
    t.style.opacity = '1';
    clearTimeout(t._h);
    t._h = setTimeout(() => { t.style.opacity = '0'; }, 4000);
  }
  const STALE = 'Failed — your daemon is out of date. Run: beacon restart  (or: beacon stop && beacon start -d)';

  document.getElementById('clear').onclick = async () => {
    if (!confirm('Clear the board?\n\nThis dismisses ALL current activity for every session — active ones reappear as they keep working. It does NOT touch any files, work, or history.')) return;
    const ok = await ctl('/clear');
    toast(ok ? 'Board cleared.' : STALE, !ok);
  };
  document.getElementById('restart').onclick = async () => {
    if (!confirm('Restart the Beacon daemon?')) return;
    const ok = await ctl('/restart');
    if (ok) { countEl.textContent = 'restarting…'; toast('Restarting…'); } // dot will blink red→green as SSE reconnects
    else toast(STALE, true);
    // EventSource reconnects automatically once the new daemon is up.
  };
  document.getElementById('quit').onclick = async () => {
    if (!confirm('Stop the Beacon daemon? The dashboard will go offline until you start it again.')) return;
    const ok = await ctl('/shutdown');
    if (ok) { countEl.textContent = 'stopped'; dot.style.background = 'var(--danger)'; toast('Daemon stopped.'); }
    else toast(STALE, true);
  };

  // --- theme (light / dark) ---
  const root = document.documentElement;
  function setTheme(t) { root.setAttribute('data-theme', t); try { localStorage.setItem('beaconTheme', t); } catch {} }
  setTheme((() => { try { return localStorage.getItem('beaconTheme'); } catch { return null; } })()
    || (matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark'));
  document.getElementById('theme').onclick = () => setTheme(root.getAttribute('data-theme') === 'light' ? 'dark' : 'light');

  // --- details modal ---
  const overlay = document.getElementById('overlay');
  function fmt(ts) { try { return new Date(ts).toLocaleString(); } catch { return ts; } }
  function openDetails(id) {
    const a = lastItems.find(x => x.id === id);
    if (!a) return;
    const expiresIn = Math.max(0, Math.round((a.heartbeat + a.ttlMs - Date.now()) / 1000));
    const row = (k, v) => v ? `<dt>${k}</dt><dd>${escapeHtml(v)}</dd>` : '';
    document.getElementById('mbody').innerHTML = `<dl>
      ${row('session / actor', a.actor)}
      ${row('label', a.actorLabel)}
      ${row('action', a.action)}
      ${row('target', a.target || '(working tree)')}
      ${row('working dir', a.cwd)}
      ${row('detail', a.detail)}
      ${row('started', fmt(a.startedAt))}
      ${row('last seen', fmt(a.heartbeat))}
      <dt>expires in</dt><dd>${expiresIn}s</dd>
      <dt>exclusive</dt><dd>${a.exclusive ? 'yes' : 'no'}</dd>
    </dl>`;
    overlay.classList.add('open');
  }
  function closeDetails() { overlay.classList.remove('open'); }
  listEl.addEventListener('click', (e) => {
    const b = e.target.closest('.detailbtn');
    if (b) openDetails(b.getAttribute('data-id'));
  });
  document.getElementById('mclose').onclick = closeDetails;
  overlay.onclick = (e) => { if (e.target === overlay) closeDetails(); };

  // --- settings / updates / logs ---
  const soverlay = document.getElementById('soverlay');
  const getJSON = async (p) => { try { return await (await fetch(p)).json(); } catch { return null; } };
  const postJSON = async (p, b) => { try { return await (await fetch(p, { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify(b || {}) })).json(); } catch { return null; } };

  async function loadSettings() {
    const s = await getJSON('/settings');
    const bootHint = document.getElementById('bootHint');
    const setBoot = document.getElementById('setBoot');
    // Old daemon has no /settings endpoint (404 → no platform). Don't mislabel that as "unsupported OS".
    if (!s || s.error || !s.platform) {
      bootHint.textContent = '(daemon out of date — run `beacon restart`)';
      setBoot.disabled = true;
      return;
    }
    document.getElementById('setAutoCheck').checked = !!s.autoCheckUpdates;
    setBoot.checked = !!s.startOnBoot;
    const supported = ['win32', 'linux', 'darwin'].includes(s.platform);
    bootHint.textContent = supported ? '' : '(not supported on ' + s.platform + ')';
    setBoot.disabled = !supported;
    const h = await getJSON('/health');
    document.getElementById('verLine').textContent = 'version ' + (h ? 'v' + h.version : '—');
  }
  async function loadLogDays(keep) {
    const d = await getJSON('/logs/days');
    const days = (d && d.days) || [];
    const el = document.getElementById('logDay');
    el.innerHTML = days.length
      ? days.map((x) => `<option value="${x.date}">${x.date}  (${Math.round(x.size / 102.4) / 10} KB)</option>`).join('')
      : '<option value="">(no logs)</option>';
    if (keep && days.some((x) => x.date === keep)) el.value = keep;
    viewLog();
  }
  async function viewLog() {
    const date = document.getElementById('logDay').value;
    const v = document.getElementById('logView');
    if (!date) { v.textContent = '(no logs)'; return; }
    const d = await getJSON('/logs?date=' + encodeURIComponent(date) + '&tail=1000');
    v.textContent = (d && d.content) || '(empty)';
    v.scrollTop = v.scrollHeight;
  }
  function closeSettings() { soverlay.classList.remove('open'); }
  document.getElementById('settings').onclick = async () => { await loadSettings(); await loadLogDays(); soverlay.classList.add('open'); };
  document.getElementById('sclose').onclick = closeSettings;
  soverlay.onclick = (e) => { if (e.target === soverlay) closeSettings(); };

  document.getElementById('setAutoCheck').onchange = async (e) => { await postJSON('/settings', { autoCheckUpdates: e.target.checked }); toast('Setting saved.'); };
  document.getElementById('setBoot').onchange = async (e) => {
    const r = await postJSON('/settings', { startOnBoot: e.target.checked });
    if (r && r.autoStart && r.autoStart.ok === false) {
      e.target.checked = !!r.startOnBoot;
      document.getElementById('bootHint').textContent = '(' + (r.autoStart.message || 'failed') + ')';
      toast('Start on login: ' + (r.autoStart.message || 'failed'), true);
    } else toast('Start on login ' + (e.target.checked ? 'enabled' : 'disabled') + '.');
  };
  document.getElementById('checkUpd').onclick = async () => {
    const el = document.getElementById('updResult'), apply = document.getElementById('applyUpd');
    el.textContent = 'checking…'; apply.style.display = 'none';
    const r = await getJSON('/update/check');
    if (!r || r.error) { el.textContent = r ? r.error : 'check failed'; return; }
    if (r.updateAvailable) {
      el.innerHTML = `update available: <b>v${escapeHtml(r.latest)}</b> (you have v${escapeHtml(r.current)}) — <a href="${r.url}" target="_blank">notes</a>`;
      apply.style.display = r.isGitRepo ? 'inline-block' : 'none';
    } else el.textContent = `up to date (v${escapeHtml(r.current)})`;
  };
  document.getElementById('applyUpd').onclick = async () => {
    if (!confirm('Run `git pull` to update Beacon? Restart the daemon afterward.')) return;
    const r = await postJSON('/update/apply', {});
    toast(r && r.ok ? 'Updated — click Restart to apply.' : 'Update: ' + ((r && r.message) || 'failed'), !(r && r.ok));
  };
  document.getElementById('logDay').onchange = viewLog;
  document.getElementById('logRefresh').onclick = () => loadLogDays(document.getElementById('logDay').value);
  document.getElementById('logDel').onclick = async () => {
    const date = document.getElementById('logDay').value; if (!date) return;
    if (!confirm('Delete logs for ' + date + '?')) return;
    await postJSON('/logs/delete', { date }); toast('Deleted ' + date + '.'); loadLogDays();
  };
  document.getElementById('logDelAll').onclick = async () => {
    if (!confirm('Delete ALL logs?')) return;
    await postJSON('/logs/delete', { date: 'all' }); toast('Deleted all logs.'); loadLogDays();
  };
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') { closeDetails(); closeSettings(); } });

  // Opt-in: auto-check for updates on load only if the user enabled it.
  (async () => {
    const s = await getJSON('/settings');
    if (s && s.autoCheckUpdates) {
      const r = await getJSON('/update/check');
      if (r && r.updateAvailable) toast(`Beacon v${r.latest} available (you have v${r.current}) — open ⚙ Settings`);
    }
  })();
</script>
</body>
</html>
